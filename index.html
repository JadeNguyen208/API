<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Market Direction — AI Analysis</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);--text:#e8e8f0;--text2:#8888a0;--text3:#4a4a60;--up:#00e8a0;--up-bg:rgba(0,232,160,0.08);--down:#ff4d6d;--down-bg:rgba(255,77,109,0.08);--neutral:#f0b429;--neutral-bg:rgba(240,180,41,0.08);--accent:#7c6aff;--accent-bg:rgba(124,106,255,0.1);--mono:'Space Mono',monospace;--sans:'DM Sans',sans-serif;}
*{box-sizing:border-box;margin:0;padding:0;}
html{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;}
body{min-height:100vh;}
.topbar{border-bottom:0.5px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;background:rgba(10,10,15,0.92);backdrop-filter:blur(12px);}
.logo{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--text);letter-spacing:0.05em;display:flex;align-items:center;gap:8px;}
.logo-dot{width:7px;height:7px;border-radius:50%;background:var(--up);animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.topbar-right{font-size:11px;color:var(--text3);font-family:var(--mono);}
.main{max-width:980px;margin:0 auto;padding:28px 20px 80px;}
.setup-card{background:var(--surface);border:0.5px solid var(--border2);border-radius:12px;padding:20px;margin-bottom:24px;}
.setup-title{font-size:10px;font-family:var(--mono);font-weight:700;color:var(--text3);letter-spacing:0.1em;margin-bottom:14px;display:flex;align-items:center;gap:6px;}
.setup-title::after{content:'';flex:1;height:0.5px;background:var(--border);}
.setup-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;}
.setup-field label{font-size:10px;color:var(--text3);font-family:var(--mono);letter-spacing:0.06em;display:block;margin-bottom:5px;}
.setup-field input{width:100%;background:var(--bg);border:0.5px solid var(--border2);border-radius:8px;padding:9px 12px;font-size:12px;color:var(--text);font-family:var(--mono);outline:none;transition:border-color 0.15s;}
.setup-field input:focus{border-color:var(--accent);}
.setup-note{font-size:10px;color:var(--text3);margin-top:10px;line-height:1.6;font-family:var(--mono);}
.setup-links{display:flex;gap:12px;flex-wrap:wrap;margin-top:8px;}
.setup-link{font-size:10px;color:var(--accent);font-family:var(--mono);text-decoration:none;}
.setup-link:hover{text-decoration:underline;}
.asset-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px;margin-bottom:20px;}
.asset-btn{background:var(--surface);border:0.5px solid var(--border);border-radius:10px;padding:12px 10px;cursor:pointer;transition:border-color 0.15s,background 0.15s;text-align:left;}
.asset-btn:hover{border-color:var(--border2);background:var(--surface2);}
.asset-btn.active{border-color:var(--accent);background:var(--accent-bg);}
.ab-dot{width:5px;height:5px;border-radius:50%;background:var(--text3);margin-bottom:8px;}
.asset-btn.active .ab-dot{background:var(--accent);}
.ab-sym{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--text);}
.ab-name{font-size:11px;color:var(--text2);margin-top:2px;}
.analyze-btn{width:100%;padding:14px;background:transparent;border:0.5px solid var(--border2);border-radius:10px;font-family:var(--mono);font-size:13px;font-weight:700;color:var(--text);cursor:pointer;letter-spacing:0.05em;transition:border-color 0.15s,background 0.15s;margin-bottom:20px;}
.analyze-btn:hover{border-color:var(--accent);background:var(--accent-bg);}
.analyze-btn:disabled{opacity:0.4;cursor:not-allowed;}
.loading-bar{height:1px;background:var(--border);border-radius:1px;overflow:hidden;margin-bottom:8px;display:none;}
.loading-bar.active{display:block;}
.loading-fill{height:100%;width:0%;background:var(--accent);animation:loadfill 3s ease-in-out infinite;}
@keyframes loadfill{0%{width:0%}70%{width:85%}100%{width:95%}}
.loading-text{font-size:11px;color:var(--text3);font-family:var(--mono);margin-bottom:20px;display:none;}
.loading-text.active{display:block;}
.result{display:none;}
.result.visible{display:block;}
.price-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:16px;}
.price-card{background:var(--surface);border:0.5px solid var(--border);border-radius:10px;padding:14px 16px;}
.pc-label{font-size:10px;color:var(--text3);font-family:var(--mono);letter-spacing:0.06em;margin-bottom:6px;}
.pc-value{font-size:20px;font-weight:500;font-family:var(--mono);color:var(--text);}
.pc-sub{font-size:12px;margin-top:3px;font-family:var(--mono);}
.up-color{color:var(--up);}
.down-color{color:var(--down);}
.neutral-color{color:var(--neutral);}
.badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:6px;font-size:11px;font-weight:700;font-family:var(--mono);letter-spacing:0.04em;}
.badge-up{background:var(--up-bg);color:var(--up);border:0.5px solid rgba(0,232,160,0.2);}
.badge-down{background:var(--down-bg);color:var(--down);border:0.5px solid rgba(255,77,109,0.2);}
.badge-neutral{background:var(--neutral-bg);color:var(--neutral);border:0.5px solid rgba(240,180,41,0.2);}
.section-block{background:var(--surface);border:0.5px solid var(--border);border-radius:10px;padding:16px 18px;margin-bottom:12px;}
.section-title{font-size:10px;font-family:var(--mono);font-weight:700;color:var(--text3);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:6px;}
.section-title::after{content:'';flex:1;height:0.5px;background:var(--border);}
.bullet{display:flex;gap:10px;align-items:flex-start;margin-bottom:7px;line-height:1.55;font-size:13px;color:var(--text2);}
.bullet-tick{color:var(--text3);font-size:11px;margin-top:2px;flex-shrink:0;font-family:var(--mono);}
.pred-grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
@media(max-width:600px){.pred-grid3{grid-template-columns:1fr;}}
.pred-card{background:var(--surface2);border:0.5px solid var(--border);border-radius:10px;padding:14px 16px;}
.pred-tf{font-size:10px;font-family:var(--mono);color:var(--text3);letter-spacing:0.08em;margin-bottom:8px;}
.conf-track{height:3px;background:var(--border2);border-radius:2px;margin:10px 0 4px;overflow:hidden;}
.conf-fill{height:100%;border-radius:2px;transition:width 1s cubic-bezier(0.4,0,0.2,1);}
.conf-fill-up{background:var(--up);}
.conf-fill-down{background:var(--down);}
.conf-fill-neutral{background:var(--neutral);}
.conf-label{font-size:10px;color:var(--text3);font-family:var(--mono);}
.pred-reason{font-size:12px;color:var(--text2);margin-top:8px;line-height:1.6;}
.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.chart-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px;}
@media(max-width:700px){.chart-grid,.chart-grid-3{grid-template-columns:1fr;}}
.chart-card{background:var(--surface);border:0.5px solid var(--border);border-radius:10px;padding:16px 18px;}
.tag-wrap{display:flex;flex-wrap:wrap;gap:6px;}
.tag{font-size:11px;padding:4px 10px;border:0.5px solid var(--border2);border-radius:6px;color:var(--text2);font-family:var(--mono);}
.news-item{padding:10px 0;border-bottom:0.5px solid var(--border);line-height:1.55;}
.news-item:last-child{border-bottom:none;}
.news-src{font-size:10px;color:var(--text3);font-family:var(--mono);margin-bottom:3px;}
.news-title{font-size:12px;color:var(--text2);}
.news-snippet{font-size:11px;color:var(--text3);margin-top:3px;line-height:1.5;}
.news-link{font-size:10px;color:var(--accent);font-family:var(--mono);text-decoration:none;margin-top:3px;display:inline-block;}
.signal-row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:0.5px solid var(--border);}
.signal-row:last-child{border-bottom:none;}
.corr-row{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:0.5px solid var(--border);}
.corr-row:last-child{border-bottom:none;}
.corr-name{color:var(--text2);font-family:var(--mono);font-size:11px;width:80px;flex-shrink:0;}
.corr-bar-wrap{flex:1;height:4px;background:var(--border2);border-radius:2px;overflow:hidden;}
.corr-bar{height:100%;border-radius:2px;}
.corr-val{font-family:var(--mono);font-size:10px;width:36px;text-align:right;}
.refresh-btn{background:transparent;border:0.5px solid var(--border2);border-radius:8px;padding:8px 16px;font-family:var(--mono);font-size:11px;font-weight:700;color:var(--text2);cursor:pointer;letter-spacing:0.05em;transition:border-color 0.15s;margin-top:4px;}
.refresh-btn:hover{border-color:var(--accent);color:var(--text);}
.disclaimer{font-size:11px;color:var(--text3);line-height:1.65;border-top:0.5px solid var(--border);padding-top:14px;margin-top:16px;font-family:var(--mono);}
.timestamp{font-size:10px;color:var(--text3);font-family:var(--mono);margin-top:8px;}
.error-msg{background:var(--down-bg);border:0.5px solid rgba(255,77,109,0.2);border-radius:10px;padding:16px 18px;color:var(--down);font-size:13px;font-family:var(--mono);line-height:1.6;}
</style>
</head>
<body>
<div class="topbar">
  <div class="logo"><div class="logo-dot"></div>MARKET DIRECTION</div>
  <div class="topbar-right" id="ts-top">SERPER.DEV + GEMINI · FREE</div>
</div>
<div class="main">
  <div class="setup-card">
    <div class="setup-title">API CONFIGURATION</div>
    <div class="setup-grid">
      <div class="setup-field">
        <label>SERPER.DEV API KEY</label>
        <input type="password" id="serp-key" placeholder="abc123..." autocomplete="off">
      </div>
      <div class="setup-field">
        <label>GEMINI API KEY</label>
        <input type="password" id="gemini-key" placeholder="AIza..." autocomplete="off">
      </div>
    </div>
    <div class="setup-note">Keys chỉ lưu trong session. Serper: 2500 searches/tháng free. Gemini: miễn phí hoàn toàn.</div>
    <div class="setup-links">
      <a class="setup-link" href="https://serper.dev" target="_blank">→ Serper.dev key (free)</a>
      <a class="setup-link" href="https://aistudio.google.com/apikey" target="_blank">→ Gemini key (free)</a>
    </div>
  </div>

  <div class="asset-grid" id="asset-grid"></div>

  <button class="analyze-btn" id="analyze-btn" onclick="analyze()">
    ▶ ANALYZE — <span id="selected-label">GOLD (XAU/USD)</span>
  </button>

  <div class="loading-bar" id="loading-bar"><div class="loading-fill"></div></div>
  <div class="loading-text" id="loading-text">⟳ Fetching market data...</div>
  <div class="result" id="result"></div>
</div>

<script>
const ASSETS=[
  {sym:'XAU/USD',name:'Gold',        key:'XAUUSD', q:'gold XAU USD price today',          qNews:'gold market analysis macro today'},
  {sym:'EUR/USD',name:'Euro',         key:'EURUSD', q:'EUR USD exchange rate today',        qNews:'EURUSD forex analysis today'},
  {sym:'GBP/USD',name:'Pound',        key:'GBPUSD', q:'GBP USD exchange rate today',        qNews:'GBPUSD forex analysis today'},
  {sym:'BTC/USD',name:'Bitcoin',      key:'BTCUSD', q:'bitcoin BTC price today USD',        qNews:'bitcoin market news analysis today'},
  {sym:'S&P 500',name:'US Equities',  key:'US500',  q:'S&P 500 index price today',          qNews:'S&P 500 market analysis today'},
  {sym:'DXY',    name:'Dollar Index', key:'DXY',    q:'US dollar index DXY today',          qNews:'dollar index DXY analysis today'},
  {sym:'WTI Oil',name:'Crude Oil',    key:'WTIUSD', q:'WTI crude oil price today',          qNews:'crude oil market analysis today'},
  {sym:'NAS 100',name:'Nasdaq',       key:'NAS100', q:'Nasdaq 100 NQ100 price today',       qNews:'Nasdaq 100 analysis today'},
];

let currentKey='XAUUSD',isLoading=false,charts={};

function initGrid(){
  document.getElementById('asset-grid').innerHTML=ASSETS.map(a=>
    `<button class="asset-btn${a.key===currentKey?' active':''}" onclick="selectAsset('${a.key}','${a.sym}',this)">
      <div class="ab-dot"></div><div class="ab-sym">${a.sym}</div><div class="ab-name">${a.name}</div>
    </button>`).join('');
}
function selectAsset(key,sym,btn){
  currentKey=key;
  document.querySelectorAll('.asset-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('selected-label').textContent=sym;
}

async function serperSearch(query,apiKey){
  const res=await fetch('https://google.serper.dev/search',{
    method:'POST',
    headers:{'X-API-KEY':apiKey,'Content-Type':'application/json'},
    body:JSON.stringify({q:query,num:6,gl:'us',hl:'en'})
  });
  const data=await res.json();
  if(data.error) throw new Error('Serper: '+data.error);
  const parts=[];
  if(data.answerBox){
    const ab=data.answerBox;
    parts.push(`[ANSWER BOX] ${ab.title||''}: ${ab.answer||ab.snippet||''}`);
  }
  if(data.knowledgeGraph){
    const kg=data.knowledgeGraph;
    parts.push(`[KNOWLEDGE] ${kg.title||''}: ${kg.description||''}`);
  }
  (data.organic||[]).slice(0,5).forEach(r=>{
    parts.push(`[${r.link||''}] ${r.title||''}: ${r.snippet||''}`);
  });
  return {text:parts.join('\n'), raw:data};
}

async function analyze(){
  if(isLoading) return;
  const serpKey=document.getElementById('serp-key').value.trim();
  const geminiKey=document.getElementById('gemini-key').value.trim();
  if(!serpKey){alert('Nhập Serper.dev API key.');return;}
  if(!geminiKey){alert('Nhập Gemini API key.');return;}

  isLoading=true;
  document.getElementById('analyze-btn').disabled=true;
  document.getElementById('loading-bar').classList.add('active');
  document.getElementById('loading-text').classList.add('active');
  document.getElementById('result').classList.remove('visible');

  const asset=ASSETS.find(a=>a.key===currentKey);
  const assetLabel=`${asset.sym} (${asset.name})`;
  const lt=document.getElementById('loading-text');

  try{
    lt.textContent='⟳ [1/4] Fetching price data...';
    const priceResult=await serperSearch(asset.q,serpKey);

    lt.textContent='⟳ [2/4] Fetching news & macro...';
    const newsResult=await serperSearch(asset.qNews,serpKey);

    lt.textContent='⟳ [3/4] Fetching economic calendar...';
    const calResult=await serperSearch('economic calendar this week CPI NFP Fed rate decision inflation',serpKey);

    lt.textContent='⟳ [4/4] Analyzing with Gemini AI...';

    const newsItems=(newsResult.raw.organic||[]).slice(0,6).map(r=>({
      src:r.link||'',title:r.title||'',snippet:r.snippet||'',link:r.link||'#'
    }));

    const prompt=`You are a professional financial trader with 20 years of experience.

Real-time data from Google Search (via Serper):

=== PRICE DATA ===
${priceResult.text}

=== NEWS & MACRO ===
${newsResult.text}

=== ECONOMIC CALENDAR ===
${calResult.text}

Analyze ${assetLabel} and return ONLY valid JSON (no markdown, no extra text):

{
  "price": "current price string",
  "change24h": "+1.2% or -0.8% or N/A",
  "high24h": "24h high or N/A",
  "low24h": "24h low or N/A",
  "volume": "volume or N/A",
  "sentiment": "bullish or bearish or neutral",
  "sentimentLabel": "Strongly Bullish or Bullish or Neutral or Bearish or Strongly Bearish",
  "sentimentScore": 65,
  "summary": "2-3 sentence market summary",
  "macro": ["factor1","factor2","factor3","factor4","factor5"],
  "keyLevels": {"support1":"","support2":"","resistance1":"","resistance2":""},
  "upcomingEvents": ["event1 with date","event2","event3","event4"],
  "technicalSignals": [
    {"name":"Trend","value":"Uptrend or Downtrend or Sideways","bias":"up or down or neutral"},
    {"name":"Momentum","value":"Strong or Moderate or Weak","bias":"up or down or neutral"},
    {"name":"Risk Sentiment","value":"Risk-On or Risk-Off or Neutral","bias":"up or down or neutral"},
    {"name":"DXY Impact","value":"Bullish or Bearish or Neutral","bias":"up or down or neutral"},
    {"name":"Volatility","value":"High or Medium or Low","bias":"up or down or neutral"}
  ],
  "correlations": [
    {"name":"DXY","value":-0.85,"note":"inverse"},
    {"name":"VIX","value":0.60,"note":"positive"},
    {"name":"S&P500","value":-0.40,"note":""},
    {"name":"Bonds","value":0.70,"note":""}
  ],
  "pred5m":  {"direction":"up or down or sideways","label":"UP or DOWN or FLAT","confidence":65,"reason":"specific reason"},
  "pred15m": {"direction":"up or down or sideways","label":"UP or DOWN or FLAT","confidence":60,"reason":"specific reason"},
  "pred1h":  {"direction":"up or down or sideways","label":"UP or DOWN or FLAT","confidence":55,"reason":"specific reason"}
}

sentimentScore: 0=strongly bearish,50=neutral,100=strongly bullish. Max confidence:82.`;

    const gRes=await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=${geminiKey}`,
      {method:'POST',headers:{'Content-Type':'application/json'},
       body:JSON.stringify({contents:[{parts:[{text:prompt}]}],generationConfig:{temperature:0.2,maxOutputTokens:2000}})}
    );
    const gData=await gRes.json();
    if(gData.error) throw new Error('Gemini: '+gData.error.message);
    let raw=gData.candidates?.[0]?.content?.parts?.[0]?.text||'';
    raw=raw.replace(/```json|```/g,'').trim();
    const f=raw.indexOf('{'),l=raw.lastIndexOf('}');
    if(f!==-1&&l!==-1) raw=raw.slice(f,l+1);
    const d=JSON.parse(raw);
    renderResult(d,assetLabel,newsItems);

  }catch(err){
    document.getElementById('result').innerHTML=
      `<div class="error-msg">ERROR: ${err.message}<br><br>Kiểm tra lại Serper key và Gemini key.</div>`;
    document.getElementById('result').classList.add('visible');
  }

  isLoading=false;
  document.getElementById('analyze-btn').disabled=false;
  document.getElementById('loading-bar').classList.remove('active');
  document.getElementById('loading-text').classList.remove('active');
  lt.textContent='⟳ Fetching market data...';
}

function dc(id){if(charts[id]){charts[id].destroy();delete charts[id];}}

function renderResult(d,label,newsItems){
  const sentClass=d.sentiment==='bullish'?'badge-up':d.sentiment==='bearish'?'badge-down':'badge-neutral';
  const chgColor=(d.change24h||'').startsWith('+')?'up-color':(d.change24h||'').startsWith('-')?'down-color':'neutral-color';
  const score=Math.min(100,Math.max(0,d.sentimentScore||50));
  const kl=d.keyLevels||{};

  function predCard(p,tf){
    if(!p) return '';
    const bc=p.direction==='up'?'badge-up':p.direction==='down'?'badge-down':'badge-neutral';
    const fc=p.direction==='up'?'conf-fill-up':p.direction==='down'?'conf-fill-down':'conf-fill-neutral';
    const arrow=p.direction==='up'?'↑':p.direction==='down'?'↓':'→';
    return `<div class="pred-card">
      <div class="pred-tf">${tf}</div>
      <div><span class="badge ${bc}">${arrow} ${p.label}</span></div>
      <div class="conf-track"><div class="conf-fill ${fc}" style="width:${p.confidence}%"></div></div>
      <div class="conf-label">CONFIDENCE ${p.confidence}%</div>
      <div class="pred-reason">${p.reason}</div>
    </div>`;
  }

  const macroBullets=(d.macro||[]).map(b=>
    `<div class="bullet"><span class="bullet-tick">—</span><span>${b}</span></div>`).join('');

  const newsHTML=(newsItems||[]).map(n=>
    `<div class="news-item">
      <div class="news-src">${new URL(n.src.startsWith('http')?n.src:'https://'+n.src).hostname.replace('www.','')}</div>
      <div class="news-title">${n.title}</div>
      <div class="news-snippet">${n.snippet}</div>
      <a class="news-link" href="${n.link}" target="_blank" rel="noopener">→ Read more</a>
    </div>`).join('');

  const eventTags=(d.upcomingEvents||[]).map(e=>`<span class="tag">${e}</span>`).join('');

  const techSignals=(d.technicalSignals||[]).map(s=>{
    const bc=s.bias==='up'?'badge-up':s.bias==='down'?'badge-down':'badge-neutral';
    return `<div class="signal-row">
      <span style="font-size:12px;color:var(--text2);font-family:var(--mono);">${s.name}</span>
      <span class="badge ${bc}" style="font-size:10px;">${s.value}</span>
    </div>`;
  }).join('');

  const corrHTML=(d.correlations||[]).map(c=>{
    const abs=Math.abs(c.value||0);
    const isPos=(c.value||0)>=0;
    const bc=isPos?'var(--up)':'var(--down)';
    return `<div class="corr-row">
      <span class="corr-name">${c.name}</span>
      <div class="corr-bar-wrap"><div class="corr-bar" style="width:${abs*100}%;background:${bc};"></div></div>
      <span class="corr-val" style="color:${bc}">${c.value>0?'+':''}${c.value}</span>
    </div>`;
  }).join('');

  const now=new Date().toLocaleString('vi-VN');
  document.getElementById('ts-top').textContent=now;

  document.getElementById('result').innerHTML=`
    <div class="price-row">
      <div class="price-card">
        <div class="pc-label">PRICE — ${label}</div>
        <div class="pc-value">${d.price||'N/A'}</div>
        <div class="pc-sub ${chgColor}">${d.change24h||''}</div>
      </div>
      <div class="price-card">
        <div class="pc-label">24H RANGE</div>
        <div style="margin-top:6px;">
          <div style="font-size:11px;font-family:var(--mono);display:flex;justify-content:space-between;margin-bottom:6px;">
            <span class="up-color">H: ${d.high24h||'N/A'}</span>
            <span class="down-color">L: ${d.low24h||'N/A'}</span>
          </div>
          <div style="height:3px;background:var(--border2);border-radius:2px;overflow:hidden;">
            <div style="height:100%;width:60%;background:linear-gradient(90deg,var(--down),var(--up));border-radius:2px;"></div>
          </div>
        </div>
        <div style="margin-top:8px;font-size:11px;color:var(--text3);font-family:var(--mono);">VOL: ${d.volume||'N/A'}</div>
      </div>
      <div class="price-card">
        <div class="pc-label">MARKET SENTIMENT</div>
        <div style="margin-top:6px;"><span class="badge ${sentClass}">${d.sentimentLabel||d.sentiment}</span></div>
        <div style="margin-top:10px;">
          <div style="height:3px;background:var(--border2);border-radius:2px;overflow:hidden;">
            <div style="height:100%;width:${score}%;background:${score>60?'var(--up)':score<40?'var(--down)':'var(--neutral)'};border-radius:2px;transition:width 1s;"></div>
          </div>
          <div style="display:flex;justify-content:space-between;margin-top:3px;font-size:9px;color:var(--text3);font-family:var(--mono);">
            <span>BEAR</span><span>NEUTRAL</span><span>BULL</span>
          </div>
        </div>
      </div>
      <div class="price-card">
        <div class="pc-label">KEY LEVELS</div>
        <div style="margin-top:6px;display:flex;flex-direction:column;gap:4px;">
          <div style="display:flex;justify-content:space-between;font-size:11px;font-family:var(--mono);"><span style="color:var(--text3);">R2</span><span class="down-color">${kl.resistance2||'—'}</span></div>
          <div style="display:flex;justify-content:space-between;font-size:11px;font-family:var(--mono);"><span style="color:var(--text3);">R1</span><span class="down-color">${kl.resistance1||'—'}</span></div>
          <div style="height:0.5px;background:var(--border2);margin:2px 0;"></div>
          <div style="display:flex;justify-content:space-between;font-size:11px;font-family:var(--mono);"><span style="color:var(--text3);">S1</span><span class="up-color">${kl.support1||'—'}</span></div>
          <div style="display:flex;justify-content:space-between;font-size:11px;font-family:var(--mono);"><span style="color:var(--text3);">S2</span><span class="up-color">${kl.support2||'—'}</span></div>
        </div>
      </div>
    </div>

    ${d.summary?`<div class="section-block"><div class="section-title">MARKET SUMMARY</div><p style="font-size:13px;color:var(--text2);line-height:1.7;">${d.summary}</p></div>`:''}

    <div class="chart-grid-3">
      <div class="chart-card">
        <div class="section-title">PREDICTION CONFIDENCE</div>
        <div style="position:relative;height:160px;"><canvas id="chart-pred"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="section-title">SENTIMENT GAUGE</div>
        <div style="position:relative;height:160px;"><canvas id="chart-sent"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="section-title">CORRELATIONS</div>
        <div style="padding-top:4px;">${corrHTML}</div>
      </div>
    </div>

    <div class="chart-grid">
      <div class="chart-card">
        <div class="section-title">TECHNICAL SIGNALS</div>
        ${techSignals}
      </div>
      <div class="chart-card">
        <div class="section-title">KEY LEVELS CHART</div>
        <div style="position:relative;height:180px;"><canvas id="chart-levels"></canvas></div>
      </div>
    </div>

    <div class="section-block">
      <div class="section-title">MACRO & FUNDAMENTAL DRIVERS</div>
      ${macroBullets}
    </div>

    <div class="section-block">
      <div class="section-title">SHORT-TERM PREDICTIONS</div>
      <div class="pred-grid3">
        ${predCard(d.pred5m,'5-MINUTE')}
        ${predCard(d.pred15m,'15-MINUTE')}
        ${predCard(d.pred1h,'1-HOUR')}
      </div>
    </div>

    ${newsHTML?`<div class="section-block"><div class="section-title">LATEST NEWS (LIVE)</div>${newsHTML}</div>`:''}
    ${eventTags?`<div class="section-block"><div class="section-title">UPCOMING EVENTS</div><div class="tag-wrap">${eventTags}</div></div>`:''}

    <div style="margin-top:8px;">
      <button class="refresh-btn" onclick="analyze()">↺ REFRESH ANALYSIS</button>
    </div>
    <div class="disclaimer">
      ⚠ Phân tích tổng hợp từ Gemini AI + Serper.dev (Google Search). Không phải tín hiệu giao dịch chính xác.<br>
      Thị trường luôn có rủi ro không thể dự đoán — không dùng làm cơ sở đầu tư duy nhất.
    </div>
    <div class="timestamp">Last updated: ${now}</div>
  `;
  document.getElementById('result').classList.add('visible');

  // Chart 1: Confidence bar
  dc('chart-pred');
  const p5=d.pred5m||{},p15=d.pred15m||{},p1h=d.pred1h||{};
  const cDir=p=>p.direction==='up'?'rgba(0,232,160,0.75)':p.direction==='down'?'rgba(255,77,109,0.75)':'rgba(240,180,41,0.75)';
  const cDirB=p=>p.direction==='up'?'#00e8a0':p.direction==='down'?'#ff4d6d':'#f0b429';
  charts['chart-pred']=new Chart(document.getElementById('chart-pred'),{
    type:'bar',
    data:{labels:['5-min','15-min','1-hour'],datasets:[{
      data:[p5.confidence||0,p15.confidence||0,p1h.confidence||0],
      backgroundColor:[cDir(p5),cDir(p15),cDir(p1h)],
      borderColor:[cDirB(p5),cDirB(p15),cDirB(p1h)],
      borderWidth:1,borderRadius:4
    }]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:v=>` ${v.raw}% confidence`},backgroundColor:'#1a1a24',titleColor:'#8888a0',bodyColor:'#e8e8f0',borderColor:'rgba(255,255,255,0.13)',borderWidth:0.5}},
      scales:{x:{ticks:{color:'#4a4a60',font:{family:"'Space Mono'",size:10}},grid:{color:'rgba(255,255,255,0.04)'}},y:{min:0,max:100,ticks:{color:'#4a4a60',font:{family:"'Space Mono'",size:10},callback:v=>v+'%'},grid:{color:'rgba(255,255,255,0.04)'}}}}
  });

  // Chart 2: Sentiment doughnut
  dc('chart-sent');
  const sentColor=score>60?'#00e8a0':score<40?'#ff4d6d':'#f0b429';
  charts['chart-sent']=new Chart(document.getElementById('chart-sent'),{
    type:'doughnut',
    data:{datasets:[{data:[score,100-score],backgroundColor:[sentColor,'rgba(255,255,255,0.04)'],borderColor:[sentColor,'transparent'],borderWidth:1,circumference:270,rotation:225}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:'72%',plugins:{legend:{display:false},tooltip:{enabled:false}}},
    plugins:[{id:'ct',afterDraw(c){
      const{ctx,chartArea:{left,top,width,height}}=c;
      ctx.save();
      ctx.fillStyle=sentColor;ctx.font="bold 22px 'Space Mono'";ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(score,left+width/2,top+height/2-4);
      ctx.fillStyle='#4a4a60';ctx.font="10px 'Space Mono'";
      ctx.fillText('/100',left+width/2,top+height/2+16);
      ctx.restore();
    }}]
  });

  // Chart 3: Key levels horizontal bar
  dc('chart-levels');
  const price=parseFloat((d.price||'0').replace(/[^0-9.]/g,''))||0;
  const s2v=parseFloat((kl.support2||'').replace(/[^0-9.]/g,''))||price*0.98;
  const s1v=parseFloat((kl.support1||'').replace(/[^0-9.]/g,''))||price*0.99;
  const r1v=parseFloat((kl.resistance1||'').replace(/[^0-9.]/g,''))||price*1.01;
  const r2v=parseFloat((kl.resistance2||'').replace(/[^0-9.]/g,''))||price*1.02;
  const allV=[s2v,s1v,price,r1v,r2v];
  const minV=Math.min(...allV)*0.9985,maxV=Math.max(...allV)*1.0015;
  charts['chart-levels']=new Chart(document.getElementById('chart-levels'),{
    type:'bar',
    data:{labels:['S2','S1','PRICE','R1','R2'],datasets:[{
      data:allV,
      backgroundColor:['rgba(0,232,160,0.25)','rgba(0,232,160,0.45)','rgba(124,106,255,0.6)','rgba(255,77,109,0.45)','rgba(255,77,109,0.25)'],
      borderColor:['#00e8a0','#00e8a0','#7c6aff','#ff4d6d','#ff4d6d'],
      borderWidth:1,borderRadius:4
    }]},
    options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:v=>` ${v.raw}`},backgroundColor:'#1a1a24',titleColor:'#8888a0',bodyColor:'#e8e8f0',borderColor:'rgba(255,255,255,0.13)',borderWidth:0.5}},
      scales:{x:{min:minV,max:maxV,ticks:{color:'#4a4a60',font:{family:"'Space Mono'",size:9},maxTicksLimit:4},grid:{color:'rgba(255,255,255,0.04)'}},y:{ticks:{color:'#8888a0',font:{family:"'Space Mono'",size:10}},grid:{color:'rgba(255,255,255,0.04)'}}}}
  });
}

initGrid();
document.getElementById('serp-key').value='d37deed03736af16bd7bb92acddf67a5f5c0858c';
document.getElementById('gemini-key').value='AIzaSyDwT-8xAGJYED0Xjz5wwGSqPJujfMVNqZU';
</script>
</body>
